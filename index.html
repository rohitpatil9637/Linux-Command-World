<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linux — Interview Commands </title>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --dim: #484f58;
      --green: #3fb950;
      --blue: #58a6ff;
      --amber: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
      --teal: #39d353;
      --cyan: #56d364;
      --accent: #238636;
      --accent2: #1f6feb;
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh
    }

    /* HEADER */
    .hero {
      background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 3rem 2rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2330363d' fill-opacity='0.3'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")
    }

    .hero-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 600;
      color: var(--green);
      text-shadow: 0 0 40px rgba(63, 185, 80, 0.3);
      position: relative
    }

    .hero-title span {
      color: var(--blue)
    }

    .hero-sub {
      color: var(--muted);
      margin-top: .75rem;
      font-size: 1rem;
      font-weight: 300;
      position: relative
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      margin-top: 1.25rem;
      background: rgba(63, 185, 80, 0.1);
      border: 1px solid rgba(63, 185, 80, 0.3);
      color: var(--green);
      padding: .4rem 1rem;
      border-radius: 2rem;
      font-size: .8rem;
      font-family: 'JetBrains Mono', monospace;
      position: relative
    }

    /* SEARCH */
    .search-wrap {
      padding: 1.5rem 2rem 1rem;
      max-width: 900px;
      margin: 0 auto
    }

    .search-box {
      position: relative
    }

    .search-box input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .85rem 1rem .85rem 3rem;
      color: var(--text);
      font-size: .95rem;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      transition: border-color .2s
    }

    .search-box input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.12)
    }

    .search-box input::placeholder {
      color: var(--dim)
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem
    }

    .search-count {
      text-align: center;
      color: var(--muted);
      font-size: .8rem;
      margin-top: .5rem;
      font-family: 'JetBrains Mono', monospace
    }

    /* NAV */
    .nav-tabs {
      display: flex;
      gap: .4rem;
      padding: 0 2rem 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
      flex-wrap: wrap;
      justify-content: center
    }

    .tab-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .45rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: .78rem;
      font-family: 'JetBrains Mono', monospace;
      transition: all .2s;
      white-space: nowrap
    }

    .tab-btn:hover,
    .tab-btn.active {
      background: var(--accent2);
      border-color: var(--blue);
      color: var(--text)
    }

    .tab-btn .tab-count {
      opacity: .6;
      font-size: .7rem;
      margin-left: .3rem
    }

    /* MAIN */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 1.5rem
    }

    @media(max-width:900px) {
      .main {
        grid-template-columns: 1fr
      }
    }

    /* SIDEBAR */
    .sidebar {
      position: sticky;
      top: 1rem;
      height: fit-content;
      max-height: 90vh;
      overflow-y: auto
    }

    .sidebar::-webkit-scrollbar {
      width: 4px
    }

    .sidebar::-webkit-scrollbar-track {
      background: transparent
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px
    }

    .sidebar-section {
      margin-bottom: .25rem
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .55rem .85rem;
      border-radius: 8px;
      cursor: pointer;
      color: var(--muted);
      font-size: .82rem;
      font-family: 'JetBrains Mono', monospace;
      transition: all .18s;
      border: 1px solid transparent;
      text-decoration: none
    }

    .sidebar-item:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border)
    }

    .sidebar-item.active {
      background: rgba(88, 166, 255, 0.1);
      color: var(--blue);
      border-color: rgba(88, 166, 255, 0.2)
    }

    .sidebar-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0
    }

    /* SECTIONS */
    .sections {
      display: flex;
      flex-direction: column;
      gap: 1.5rem
    }

    .section-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      scroll-margin-top: 1rem
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2)
    }

    .section-icon {
      font-size: 1.4rem;
      line-height: 1
    }

    .section-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text)
    }

    .section-desc {
      font-size: .78rem;
      color: var(--muted);
      margin-top: .15rem
    }

    .section-badge {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .2rem .6rem;
      border-radius: 6px;
      font-size: .7rem;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap
    }

    /* COMMAND CARDS */
    .cmd-grid {
      display: grid;
      gap: 0
    }

    .cmd-card {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      transition: background .15s;
      position: relative
    }

    .cmd-card:last-child {
      border-bottom: none
    }

    .cmd-card:hover {
      background: var(--surface2)
    }

    .cmd-card.hidden {
      display: none
    }

    .cmd-top {
      display: flex;
      align-items: flex-start;
      gap: .75rem;
      flex-wrap: wrap
    }

    .cmd-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: .82rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .35rem .75rem;
      color: var(--green);
      flex-shrink: 0;
      position: relative;
      cursor: pointer;
      transition: all .15s;
      max-width: 100%;
      word-break: break-all
    }

    .cmd-code:hover {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(63, 185, 80, 0.12)
    }

    .cmd-code.copied {
      border-color: var(--blue);
      color: var(--blue)
    }

    .cmd-desc {
      color: var(--text);
      font-size: .88rem;
      flex: 1;
      min-width: 180px
    }

    .cmd-example {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      color: var(--amber);
      background: rgba(210, 153, 34, 0.07);
      border: 1px solid rgba(210, 153, 34, 0.15);
      border-radius: 6px;
      padding: .4rem .8rem;
      margin-top: .6rem;
      word-break: break-all
    }

    .cmd-example-label {
      font-size: .68rem;
      color: var(--dim);
      font-family: 'Space Grotesk', sans-serif;
      margin-top: .5rem;
      margin-bottom: .2rem;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .cmd-tip {
      display: flex;
      gap: .5rem;
      align-items: flex-start;
      background: rgba(88, 166, 255, 0.06);
      border: 1px solid rgba(88, 166, 255, 0.15);
      border-radius: 6px;
      padding: .5rem .8rem;
      margin-top: .6rem;
      font-size: .8rem;
      color: var(--blue)
    }

    .cmd-tip-icon {
      flex-shrink: 0;
      opacity: .7
    }

    .copy-hint {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      font-size: .6rem;
      color: var(--dim);
      font-family: 'Space Grotesk', sans-serif;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s
    }

    .cmd-code:hover .copy-hint {
      opacity: 1
    }

    .tags {
      display: flex;
      gap: .35rem;
      margin-top: .6rem;
      flex-wrap: wrap
    }

    .tag {
      font-size: .65rem;
      padding: .15rem .5rem;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border)
    }

    /* INTERVIEW FLAG */
    .interview-flag {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      background: rgba(188, 140, 255, 0.08);
      border: 1px solid rgba(188, 140, 255, 0.2);
      color: var(--purple);
      font-size: .65rem;
      padding: .15rem .55rem;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      margin-left: .5rem;
      vertical-align: middle;
      flex-shrink: 0
    }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted)
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: .4
    }

    /* QUICK REF */
    .quick-ref {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.5rem
    }

    .quick-ref h3 {
      font-size: .95rem;
      color: var(--text);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: .5rem
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: .5rem
    }

    .quick-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .6rem .85rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .75rem
    }

    .quick-key {
      color: var(--green)
    }

    .quick-val {
      color: var(--muted);
      font-size: .7rem;
      margin-top: .15rem
    }

    /* TOP BAR STATS */
    .stats-bar {
      display: flex;
      gap: 1rem;
      justify-content: center;
      padding: .75rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap
    }

    .stat {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .78rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace
    }

    .stat-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="hero-title">Linux Commands</div>
    <div class="hero-sub">Complete command reference · Real-world examples · Interview tips · RHCSA/LFCS ready</div>
    <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-top:1.25rem;position:relative">
      <div class="hero-badge"
        style="background:rgba(88,166,255,0.1);border-color:rgba(88,166,255,0.3);color:var(--blue)">&#9654; 12 Sections
      </div>
      <div class="hero-badge">&#9654; 200+ Commands</div>
      <div class="hero-badge"
        style="background:rgba(188,140,255,0.1);border-color:rgba(188,140,255,0.3);color:var(--purple)">&#9654;
        Interview Flagged</div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-dot" style="background:var(--green)"></div>Click any command to copy
    </div>
    <div class="stat">
      <div class="stat-dot" style="background:var(--blue)"></div>Blue boxes = interview hot topics
    </div>
    <div class="stat">
      <div class="stat-dot" style="background:var(--amber)"></div>Orange = real-world examples
    </div>
    <div class="stat">
      <div class="stat-dot" style="background:var(--purple)"></div>Purple badge = high-frequency exam
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Search commands, flags, concepts... (e.g. grep, chmod, SELinux)"
        autocomplete="off">
    </div>
    <div class="search-count" id="searchCount"></div>
  </div>

  <div class="nav-tabs" id="navTabs"></div>

  <div class="main">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sections" id="sections"></div>
  </div>

  <script>
    const data = [
      {
        id: "essential", icon: "&#128187;", color: "#3fb950",
        title: "Essential Tools & Shell",
        desc: "Shell basics, I/O redirection, grep, SSH, documentation",
        cmds: [
          {
            cmd: "cmd --help  |  man cmd  |  info cmd", desc: "Get help for any command. man is most comprehensive, info has hyperlinks, --help is fastest.",
            ex: "man ls  |  info coreutils  |  ls --help  |  apropos partition",
            tip: "Always know where to find docs. man sections: 1=user, 5=config files, 8=admin. Try 'man 5 passwd' vs 'man passwd'", interview: true, tags: ["docs", "help"]
          },
          {
            cmd: "ls -lah  |  ls -ltr  |  ls -Z", desc: "List files: -l=long, -a=hidden, -h=human sizes, -t=time sorted, -r=reverse, -Z=SELinux context",
            ex: "ls -lah /etc/  |  ls -lt /var/log/ | head -10",
            tip: "-Z flag shows SELinux context — critical for SELinux troubleshooting questions", interview: true, tags: ["files", "basics"]
          },
          {
            cmd: "echo $VAR  |  env  |  printenv PATH", desc: "Print variables, environment. export makes variable available to child processes.",
            ex: "export MYVAR=hello  |  echo $PATH  |  env | grep HOME", tags: ["variables", "shell"]
          },
          {
            cmd: "> file  |  >> file  |  2> err  |  2>&1  |  &>all", desc: "Redirection: > overwrite, >> append, 2> stderr only, 2>&1 merge stderr to stdout, &> both to file",
            ex: "ls /nonexistent 2>/dev/null  |  find / -name '*.conf' 2>/dev/null > results.txt  |  command &> all.log",
            tip: "2>/dev/null suppresses errors — huge in scripting. 2>&1 pipes both streams together", interview: true, tags: ["redirection", "io"]
          },
          {
            cmd: "cmd1 | cmd2  |  tee file  |  xargs", desc: "Pipe output between commands. tee splits to file+stdout simultaneously. xargs builds command from stdin",
            ex: "ps aux | grep nginx | awk '{print $2}'  |  ls *.log | xargs rm  |  find . -name '*.txt' | xargs grep 'error'",
            tip: "Pipe chaining is the Linux superpower. Combine grep, awk, sort, uniq, wc for powerful one-liners", interview: true, tags: ["pipe", "redirection"]
          },
          {
            cmd: "grep 'pattern' file  |  grep -rni 'text' /dir/", desc: "Search text. -r=recursive, -n=line numbers, -i=case-insensitive, -v=invert, -l=files only, -c=count",
            ex: "grep -rni 'error' /var/log/  |  grep '^root' /etc/passwd  |  grep -v '^#' /etc/ssh/sshd_config",
            tip: "Know regex: ^ start, $ end, . any char, * zero+, + one+, [] char class, \\d digit", interview: true, tags: ["grep", "regex", "search"]
          },
          {
            cmd: "grep -E 'pat1|pat2'  |  egrep  |  fgrep 'literal'", desc: "Extended grep for complex patterns. fgrep for literal (no regex) searches — fastest for plain text",
            ex: "grep -E '^(root|admin)' /etc/passwd  |  grep -E 'failed|error|warn' /var/log/messages", tags: ["grep", "regex"]
          },
          {
            cmd: "ssh user@host  |  ssh -p 2222 user@host  |  ssh -i key.pem user@host", desc: "Connect to remote systems. -p custom port, -i identity file, -X X11 forwarding, -L local tunnel",
            ex: "ssh -i ~/.ssh/mykey.pem ec2-user@1.2.3.4  |  ssh -L 8080:localhost:80 user@server",
            tip: "Know ~/.ssh/config for aliases. ssh-keygen, ssh-copy-id, authorized_keys file location", interview: true, tags: ["ssh", "remote"]
          },
          {
            cmd: "ssh-keygen -t ed25519 -C 'comment'  |  ssh-copy-id user@host", desc: "Generate SSH keypair and copy public key to remote host for passwordless login",
            ex: "ssh-keygen -t ed25519 -f ~/.ssh/mykey  |  ssh-copy-id -i ~/.ssh/mykey.pub user@192.168.1.10",
            tip: "ed25519 is preferred over rsa now. Public key goes to ~/.ssh/authorized_keys on remote", interview: true, tags: ["ssh", "security", "keys"]
          },
          {
            cmd: "su - user  |  sudo cmd  |  sudo -i  |  su -", desc: "Switch user. su - loads full environment. sudo runs as root. sudo -i starts root shell. su - = su -l root",
            ex: "su - dbadmin  |  sudo systemctl restart nginx  |  sudo -u www-data whoami",
            tip: "su - vs su: always use su - to get full login environment (PATH, HOME, etc)", interview: true, tags: ["users", "sudo", "switch"]
          },
          {
            cmd: "who  |  w  |  last  |  lastlog  |  id", desc: "Who is logged in, recent logins, current user info",
            ex: "who -a  |  last | head -20  |  id  |  id username  |  lastlog | grep -v Never", tags: ["users", "info"]
          },
          {
            cmd: "awk '{print $1,$3}' file  |  awk -F: '{print $1}' /etc/passwd", desc: "Text processing powerhouse. -F sets field separator. $0=whole line, NR=line number, NF=field count",
            ex: "awk -F: '$3>=1000{print $1}' /etc/passwd  |  df -h | awk 'NR>1{print $5,$6}'  |  awk '{sum+=$1}END{print sum}'",
            tip: "awk is essential for field extraction. Know it for parsing /etc/passwd, log files in interviews", interview: true, tags: ["awk", "text", "processing"]
          },
          {
            cmd: "sed 's/old/new/g' file  |  sed -i 's/foo/bar/g' file  |  sed -n '5,10p'", desc: "Stream editor. s=substitute, g=global, -i=in-place edit, -n=suppress, p=print",
            ex: "sed -i 's/SELINUX=permissive/SELINUX=enforcing/g' /etc/selinux/config  |  sed '/^#/d' file",
            tip: "-i is destructive — always backup first (-i.bak). sed is the go-to for config file edits in scripts", interview: true, tags: ["sed", "text", "edit"]
          },
          {
            cmd: "sort file  |  sort -k2 -n  |  sort -u  |  uniq -c  |  wc -l", desc: "Sort lines, unique values, count. -k field, -n numeric, -r reverse, -u unique. wc: -l lines -w words -c bytes",
            ex: "sort -t: -k3 -n /etc/passwd | tail  |  cat access.log | awk '{print $1}' | sort | uniq -c | sort -rn | head",
            tip: "sort | uniq -c | sort -rn is the classic 'top N' pattern — memorize it for log analysis questions", interview: true, tags: ["sort", "text", "analysis"]
          },
          {
            cmd: "cut -d: -f1,3 /etc/passwd  |  tr 'a-z' 'A-Z'  |  tr -d '\\n'", desc: "Cut fields, translate characters. cut -d delimiter -f fields. tr translates or deletes chars",
            ex: "cut -d: -f1 /etc/passwd | sort  |  echo 'hello' | tr a-z A-Z  |  cat file | tr -d ' '", tags: ["cut", "tr", "text"]
          },
          {
            cmd: "find /dir -name '*.log' -mtime -7 -size +1M", desc: "Find files by name, time, size, permissions. -mtime -7 = modified last 7 days. -exec runs command",
            ex: "find / -perm -4000 -type f 2>/dev/null  |  find /tmp -mtime +30 -delete  |  find . -name '*.conf' -exec grep -l 'error' {} \\;",
            tip: "find -perm -4000 finds SUID files — security interview classic. -exec vs xargs: xargs is faster for many files", interview: true, tags: ["find", "files", "search"]
          },
          {
            cmd: "locate filename  |  updatedb  |  which cmd  |  whereis cmd  |  type cmd", desc: "Find command/file locations. locate uses db (fast). updatedb refreshes it. which shows executable path",
            ex: "which python3  |  whereis nginx  |  type ls  |  locate sshd_config", tags: ["find", "location"]
          },
        ]
      },
      {
        id: "files", icon: "&#128193;", color: "#56d364",
        title: "File & Directory Management",
        desc: "Create, delete, copy, move, archive, compress files and directories",
        cmds: [
          {
            cmd: "mkdir -p /path/to/dir  |  mkdir -m 755 dirname", desc: "Create directories. -p creates parent directories as needed. -m sets permissions at creation",

          {

            ex: "getent passwd alice  |  getent group developers  |  getent passwd | awk -F: '$3>=1000'", tags: ["getent", "users", "directory"]
          },
        ]
      },
      {
        id: "security", icon: "&#128737;&#65039;", color: "#f85149",
        title: "Security: SELinux & Firewall",
        desc: "SELinux modes, contexts, booleans, ports, firewalld rules",
        cmds: [
          {
            cmd: "getenforce  |  setenforce 0  |  setenforce 1  |  /etc/selinux/config", desc: "Get/set SELinux mode. 0=Permissive (log only), 1=Enforcing (block+log). Persistent change in /etc/selinux/config",
            ex: "getenforce  |  setenforce 0  # temporary permissive (testing)\n# /etc/selinux/config: set SELINUX=enforcing for permanent",
            tip: "setenforce is temporary (lost on reboot). /etc/selinux/config is permanent. NEVER set SELINUX=disabled without clear reason", interview: true, tags: ["selinux", "enforcing", "permissive"]
          },
          {
            cmd: "ls -Z file  |  ps -Z  |  id -Z  |  ls -Zd /var/www/html", desc: "Show SELinux security context. Format: user:role:type:level. The 'type' is most important for file access",
            ex: "ls -Z /etc/passwd  |  ps -Z | grep httpd  |  ls -Zd /var/www/html  |  id -Z",
            tip: "SELinux context type matters most: httpd_t (process) needs httpd_sys_content_t (files). Type mismatch = denial", interview: true, tags: ["selinux", "context", "ls -Z"]
          },
          {
            cmd: "chcon -t httpd_sys_content_t /var/www/myapp/  |  chcon -R -t type dir/", desc: "Change SELinux context temporarily. Reverted by restorecon or relabeling. Good for testing",
            ex: "chcon -R -t httpd_sys_content_t /srv/webapp/  |  chcon --reference=/var/www/html /new/dir/", tags: ["selinux", "chcon", "context"]
          },
          {
            cmd: "semanage fcontext -a -t httpd_sys_content_t '/srv/webapp(/.*)?'  |  restorecon -Rv /srv/webapp/", desc: "PERMANENT context change. semanage sets policy, restorecon applies it. Use this, not chcon, for persistence",
            ex: "semanage fcontext -a -t httpd_sys_content_t '/opt/myapp(/.*)?'\nrestorecon -Rv /opt/myapp/\n# Verify:\nls -Z /opt/myapp/",
            tip: "The workflow: semanage fcontext -a (add policy) THEN restorecon (apply). This survives relabeling. Most important SELinux skill", interview: true, tags: ["selinux", "semanage", "restorecon", "context"]
          },
          {
            cmd: "restorecon -Rv /path/  |  touch /.autorelabel  |  fixfiles relabel /", desc: "Restore default SELinux contexts. -R recursive, -v verbose. /.autorelabel triggers full relabel on next boot",
            ex: "restorecon -Rv /etc/ssh/  |  restorecon -Rv /home/user/.ssh/",
            tip: "After moving files (mv), always run restorecon. cp preserves context but mv changes it to parent dir context", interview: true, tags: ["selinux", "restorecon", "relabel"]
          },
          {
            cmd: "getsebool -a  |  getsebool httpd_can_network_connect  |  setsebool -P httpd_can_network_connect on", desc: "SELinux booleans toggle specific behaviors. -P makes change persistent across reboots",
            ex: "getsebool -a | grep httpd  |  setsebool -P httpd_enable_homedirs on  |  setsebool -P httpd_can_network_connect_db on",
            tip: "-P = persistent. Without -P, reset after reboot. For web apps: httpd_can_network_connect, httpd_use_nfs, httpd_enable_homedirs are common", interview: true, tags: ["selinux", "booleans", "setsebool"]
          },
          {
            cmd: "semanage port -l  |  semanage port -l | grep http  |  semanage port -a -t http_port_t -p tcp 8080", desc: "SELinux port labels. Services need ports labeled with correct type. -a add, -m modify, -d delete",
            ex: "semanage port -a -t http_port_t -p tcp 8888  # allow nginx on port 8888\nsemanage port -l | grep ssh  |  semanage port -m -t ssh_port_t -p tcp 2222",
            tip: "If service fails on non-standard port, SELinux port label is likely the cause. semanage port -a fixes it", interview: true, tags: ["selinux", "ports", "semanage"]
          },
          {
            cmd: "ausearch -m avc -ts recent  |  ausearch -m avc -c httpd  |  audit2allow -M mymodule < audit.log", desc: "Search audit log for SELinux denials. audit2allow generates policy to allow denied actions",
            ex: "ausearch -m avc --start today | audit2why  |  ausearch -m avc -ts recent | audit2allow -M custom  |  semodule -i custom.pp",
            tip: "Workflow for SELinux troubleshooting: check ausearch → understand denial → fix with proper label/boolean/port vs audit2allow (last resort)", interview: true, tags: ["selinux", "audit", "ausearch", "troubleshoot"]
          },
          {
            cmd: "firewall-cmd --state  |  firewall-cmd --get-active-zones  |  firewall-cmd --list-all", desc: "Firewalld status. Zones define trust levels. --list-all shows all rules for active zone",
            ex: "firewall-cmd --state  |  firewall-cmd --get-active-zones  |  firewall-cmd --zone=public --list-all",
            tip: "firewalld uses zones. Default zones: public (external), internal, trusted, dmz. Interface assigned to a zone", interview: true, tags: ["firewall", "firewalld", "zones"]
          },
          {
            cmd: "firewall-cmd --add-service=http --permanent  |  firewall-cmd --add-port=8080/tcp --permanent  |  firewall-cmd --reload", desc: "Add firewall rules permanently. --permanent saves rule; must --reload to apply. Without --permanent: lost on reload",
            ex: "firewall-cmd --permanent --add-service=https  |  firewall-cmd --permanent --add-port=3306/tcp  |  firewall-cmd --reload\nfirewall-cmd --permanent --zone=internal --add-source=192.168.1.0/24",
            tip: "Two-step: add with --permanent AND --reload. Or use both: --permanent --add-service=x then --reload. No permanent = temp rule only", interview: true, tags: ["firewall", "firewalld", "rules", "permanent"]
          },
          {
            cmd: "firewall-cmd --remove-service=http --permanent  |  firewall-cmd --zone=public --add-rich-rule='rule...'", desc: "Remove services, add rich rules for complex firewall logic",
            ex: "firewall-cmd --permanent --zone=public --add-rich-rule='rule family=ipv4 source address=192.168.1.100 service name=ssh accept'\nfirewall-cmd --permanent --remove-port=8080/tcp  |  firewall-cmd --reload", tags: ["firewall", "firewalld", "rich-rules"]
          },
          {
            cmd: "firewall-cmd --permanent --add-masquerade  |  firewall-cmd --permanent --add-forward-port", desc: "NAT/masquerade and port forwarding with firewalld",
            ex: "firewall-cmd --permanent --zone=public --add-masquerade\nfirewall-cmd --permanent --add-forward-port=port=80:proto=tcp:toport=8080  |  firewall-cmd --reload", tags: ["firewall", "nat", "masquerade"]
          },
        ]
      },
    ];

    let activeSection = 'all';
    let searchTerm = '';

    function buildNav() {
      const tabs = document.getElementById('navTabs');
      const sidebar = document.getElementById('sidebar');

      const allCount = data.reduce((s, sec) => s + sec.cmds.length, 0);

      tabs.innerHTML = `<button class="tab-btn active" onclick="filterSection('all', this)">All <span class="tab-count">${allCount}</span></button>` +
        data.map(s => `<button class="tab-btn" onclick="filterSection('${s.id}', this)">${s.title.split(' ')[0]} <span class="tab-count">${s.cmds.length}</span></button>`).join('');

      sidebar.innerHTML = `<div class="sidebar-section">
    ${data.map(s => `<a class="sidebar-item" href="#section-${s.id}" onclick="smoothNav(event, '${s.id}')">
      <div class="sidebar-dot" style="background:${s.color}"></div>${s.title}
    </a>`).join('')}
  </div>`;
    }

    function smoothNav(e, id) {
      e.preventDefault();
      document.getElementById('section-' + id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function buildSections() {
      const container = document.getElementById('sections');
      container.innerHTML = data.map(sec => `
    <div class="section-block" id="section-${sec.id}" data-section="${sec.id}">
      <div class="section-header">
        <span class="section-icon">${sec.icon}</span>
        <div>
          <div class="section-title">${sec.title}</div>
          <div class="section-desc">${sec.desc}</div>
        </div>
        <div class="section-badge" style="color:${sec.color};border-color:${sec.color}33">${sec.cmds.length} commands</div>
      </div>
      <div class="cmd-grid">
        ${sec.cmds.map((c, i) => buildCard(c, i)).join('')}
      </div>
    </div>
  `).join('');
      updateCount();
    }

    function buildCard(c, i) {
      return `<div class="cmd-card" data-search="${(c.cmd + ' ' + c.desc + ' ' + (c.ex || '') + ' ' + (c.tags || []).join(' ')).toLowerCase()}">
    <div class="cmd-top">
      <div class="cmd-code" onclick="copyCmd(this, \`${c.cmd.replace(/`/g, '\\`')}\`)" title="Click to copy">
        <span class="copy-hint">copy</span>
        <code>${escHtml(c.cmd)}</code>
      </div>
      ${c.interview ? '<span class="interview-flag">&#9733; EXAM</span>' : ''}
    </div>
    <div class="cmd-desc" style="margin-top:.4rem">${escHtml(c.desc)}</div>
    ${c.ex ? `<div class="cmd-example-label">Real-world example</div><div class="cmd-example">${escHtml(c.ex)}</div>` : ''}
    ${c.tip ? `<div class="cmd-tip"><span class="cmd-tip-icon">&#9432;</span><span>${escHtml(c.tip)}</span></div>` : ''}
    ${c.tags ? `<div class="tags">${c.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
  </div>`;
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
    }

    function copyCmd(el, text) {
      navigator.clipboard.writeText(text).then(() => {
        el.classList.add('copied');
        const orig = el.querySelector('code').textContent;
        el.querySelector('code').textContent = 'Copied!';
        setTimeout(() => { el.classList.remove('copied'); el.querySelector('code').innerHTML = escHtml(text); }, 1500);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      });
    }

    function filterSection(id, btn) {
      activeSection = id;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.section-block').forEach(s => {
        s.style.display = (id === 'all' || s.dataset.section === id) ? '' : 'none';
      });
      applySearch();
    }

    function applySearch() {
      const term = searchTerm.toLowerCase();
      let visible = 0;
      document.querySelectorAll('.cmd-card').forEach(card => {
        const sectionHidden = card.closest('.section-block').style.display === 'none';
        const matches = !term || card.dataset.search.includes(term);
        card.classList.toggle('hidden', !matches || sectionHidden);
        if (matches && !sectionHidden) visible++;
      });

      document.querySelectorAll('.section-block').forEach(sec => {
        if (sec.style.display === 'none') return;
        const hasVisible = [...sec.querySelectorAll('.cmd-card')].some(c => !c.classList.contains('hidden'));
        if (term) sec.style.opacity = hasVisible ? '1' : '0.3';
        else sec.style.opacity = '1';
      });

      updateCount(visible);
    }

    function updateCount(n) {
      const total = data.reduce((s, sec) => s + sec.cmds.length, 0);
      const count = n !== undefined ? n : total;
      document.getElementById('searchCount').textContent = searchTerm ? `Showing ${count} matching commands` : '';
    }

    document.getElementById('searchInput').addEventListener('input', function () {
      searchTerm = this.value;
      applySearch();
    });

    buildNav();
    buildSections();
  </script>
</body>

</html>
